  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  examples:
    Problem400InvalidRequest:
      summary: Generic 400 invalid request
      value:
        type: about:blank
        title: Invalid request
        status: 400
        detail: Request payload or parameters are invalid.
    Problem400InvalidCursor:
      summary: Canonical 400 invalid cursor
      value:
        type: https://api.budgetbuddy.dev/problems/invalid-cursor
        title: Invalid cursor
        status: 400
        detail: Cursor token is malformed or unsupported.
    Problem400InvalidDateRange:
      summary: Canonical 400 invalid date range
      value:
        type: https://api.budgetbuddy.dev/problems/invalid-date-range
        title: Invalid date range
        status: 400
        detail: '`from` must be less than or equal to `to`.'
    Problem400BudgetMonthInvalid:
      summary: Canonical 400 invalid budget month
      value:
        type: https://api.budgetbuddy.dev/problems/budget-month-invalid
        title: Budget month format is invalid
        status: 400
        detail: month must follow YYYY-MM format.
    Problem400ImportBatchLimitExceeded:
      summary: Canonical 400 import batch limit exceeded
      value:
        type: https://api.budgetbuddy.dev/problems/import-batch-limit-exceeded
        title: Import batch limit exceeded
        status: 400
        detail: Number of items exceeds configured import batch limit.
    Problem401:
      summary: Canonical 401 error
      value:
        type: https://api.budgetbuddy.dev/problems/unauthorized
        title: Unauthorized
        status: 401
        detail: Missing or invalid bearer token.
    Problem403:
      summary: Canonical 403 error
      value:
        type: https://api.budgetbuddy.dev/problems/forbidden
        title: Forbidden
        status: 403
        detail: Resource is not owned by authenticated user.
    Problem403RefreshRevoked:
      summary: Canonical 403 refresh revoked
      value:
        type: https://api.budgetbuddy.dev/problems/refresh-revoked
        title: Refresh token revoked
        status: 403
        detail: Refresh session has been revoked.
    Problem403RefreshReuseDetected:
      summary: Canonical 403 refresh reuse detected
      value:
        type: https://api.budgetbuddy.dev/problems/refresh-reuse-detected
        title: Refresh token reuse detected
        status: 403
        detail: Refresh token was already used and rotated.
    Problem403OriginNotAllowed:
      summary: Canonical 403 origin not allowed
      value:
        type: https://api.budgetbuddy.dev/problems/origin-not-allowed
        title: Forbidden
        status: 403
        detail: Origin is not allowed for refresh.
    Problem406:
      summary: Canonical 406 error
      value:
        type: https://api.budgetbuddy.dev/problems/not-acceptable
        title: Not Acceptable
        status: 406
        detail: Accept header must allow a supported media type.
    Problem409Conflict:
      summary: Generic 409 conflict
      value:
        type: about:blank
        title: Conflict
        status: 409
        detail: Resource conflict with current state.
    Problem409AccountArchived:
      summary: Canonical 409 account archived
      value:
        type: https://api.budgetbuddy.dev/problems/account-archived
        title: Account is archived
        status: 409
        detail: Transactions cannot be created on archived accounts.
    Problem409CategoryTypeMismatch:
      summary: Canonical 409 category type mismatch

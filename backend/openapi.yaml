                name: Main Wallet
                type: cash
                initial_balance_cents: 150000
                note: Daily spending
                archived_at: null
        '400':
          description: Invalid request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                canonical:
                  $ref: '#/components/examples/Problem400InvalidRequest'
        '401':

            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                canonical:
                  $ref: '#/components/examples/Problem401'
        '409':
          description: Account name already exists
          content:
            application/problem+json:
              schema:

openapi: 3.1.0
info:
  title: BudgetBuddy API
  version: '1'
  description: 'Operational header behavior: responses include `X-Request-Id`.

    If request provides `X-Request-Id`, the API echoes it; otherwise it generates one.

    Cross-site CORS policy for browser clients: API uses explicit origin allowlist from configuration
    (`BUDGETBUDDY_CORS_ORIGINS`, default `http://localhost:5173`), `Access-Control-Allow-Credentials:
    true`, allowed methods `GET,POST,PATCH,DELETE,OPTIONS`, allowed headers `Authorization,Content-Type,Accept,X-Request-Id`,
    and exposed headers `X-Request-Id,Retry-After`.

    Baseline API security headers: `X-Content-Type-Options: nosniff`, `Referrer-Policy: no-referrer`,
    `Cross-Origin-Opener-Policy: same-origin`, and `Content-Security-Policy: default-src ''none''; frame-ancestors ''none''; base-uri ''none''`.

    '
servers:
- url: /api
security:
- BearerAuth: []
paths:
  /healthz:
    get:
      security: []
      summary: Liveness probe
      description: Returns process liveness without checking external dependencies.
      responses:
        '200':
          description: OK
          headers:
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/vnd.budgetbuddy.v1+json:
              schema:
                $ref: '#/components/schemas/ProbeHealthResponse'
              example:
                status: ok
                version: '1'
  /readyz:
    get:
      security: []
      summary: Readiness probe
      description: Returns readiness for serving traffic based on dependency checks.
        Database connectivity is always required. Migration head parity is additionally enforced
        when `MIGRATIONS_STRICT=true`.
      responses:
        '200':
          description: Ready
          headers:
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/vnd.budgetbuddy.v1+json:
              schema:
                $ref: '#/components/schemas/ProbeReadinessResponse'
              examples:
                strict-schema-match:
                  value:
                    status: ready
                    version: '1'
                    checks:
                      db: ok
                      schema: ok
                non-strict-schema-mismatch:
                  value:
                    status: ready
                    version: '1'
                    checks:
                      db: ok
                      schema: fail
        '503':
          description: Not Ready
          headers:
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/vnd.budgetbuddy.v1+json:
              schema:
                $ref: '#/components/schemas/ProbeReadinessResponse'
              examples:
                db-unreachable:
                  value:
                    status: not_ready
                    version: '1'
                    checks:
                      db: fail
                      schema: skip
                strict-schema-mismatch:
                  value:
                    status: not_ready
                    version: '1'
                    checks:
                      db: ok
                      schema: fail
  /auth/register:
    post:
      security: []
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/vnd.budgetbuddy.v1+json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created
          headers:
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
            Set-Cookie:
              $ref: '#/components/headers/Set-Cookie-Refresh'
          content:
            application/vnd.budgetbuddy.v1+json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
              example:
                user:
                  id: 2a4b0e6d-924d-4df0-bc22-9e639da60bcb
                  username: demo_user
                  currency_code: USD
                access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIyYTRiMGU2ZC05MjRkLTRkZjAtYmMyMi05ZTYzOWRhNjBiY2IiLCJleHAiOjE5MDAwMDAwMDAsImlhdCI6MTg5OTk5OTAwMH0.dummysignature
                access_token_expires_in: 900
        '400':
          description: Invalid request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                canonical:
                  $ref: '#/components/examples/Problem400InvalidRequest'
        '409':
          description: Username already exists
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                canonical:
                  $ref: '#/components/examples/Problem409Conflict'
        '406':
          description: Not Acceptable
          headers:
            X-Request-Id:
              $ref: '#/components/headers/X-Request-Id'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              examples:
                canonical:
                  $ref: '#/components/examples/Problem406'
  /auth/login:
    post:

      description: 'Retention policy: archived transactions are excluded from analytics totals. Restored transactions re-enter totals deterministically.'
components:
  headers:
    X-Request-Id:
      description: Correlation id for tracing requests. Propagated when provided by client, generated otherwise.
      schema:
        type: string
    Set-Cookie-Refresh:
      description: 'Refresh session cookie. By default, `Domain` is omitted (host-only cookie scoped to the API host). If `REFRESH_COOKIE_DOMAIN` is configured, `Domain=<configured_domain>` may be present. Example attributes: `bb_refresh=<token>; Path=/api/auth; Max-Age=2592000; HttpOnly; Secure; SameSite=Lax`.'
      schema:
        type: string
    Set-Cookie-Refresh-Cleared:
      description: 'Expired refresh cookie. `Domain` follows the same policy as refresh issuance: omitted by default (host-only), or included as `Domain=<configured_domain>` when configured. Example attributes: `bb_refresh=; Path=/api/auth; Max-Age=0; HttpOnly; Secure; SameSite=Lax`.'
      schema:
        type: string
    Retry-After:
      description: Seconds to wait before retrying after rate limiting.
      schema:
        type: integer
        minimum: 1

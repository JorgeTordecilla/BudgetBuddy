  schemas:
    ProblemDetails:
      type: object
      required:
      - type
      - title
      - status
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
      examples:
      - type: https://api.budgetbuddy.dev/problems/invalid-date-range
        title: Invalid date range
        status: 400
        detail: '`from` must be less than or equal to `to`.'
      - type: https://api.budgetbuddy.dev/problems/unauthorized
        title: Unauthorized
        status: 401
        detail: Missing or invalid bearer token.
      - type: https://api.budgetbuddy.dev/problems/forbidden
        title: Forbidden
        status: 403
        detail: Resource is not owned by authenticated user.
      - type: https://api.budgetbuddy.dev/problems/not-acceptable
        title: Not Acceptable
        status: 406
        detail: Accept header must allow a supported media type.
      - type: https://api.budgetbuddy.dev/problems/account-archived
        title: Account is archived
        status: 409
        detail: Transactions cannot be created on archived accounts.
      - type: https://api.budgetbuddy.dev/problems/rate-limited
        title: Too Many Requests
        status: 429
        detail: Too many requests. Retry after the interval in Retry-After.
    ProbeHealthResponse:
      type: object
      required:
      - status
      - version
      properties:
        status:
          type: string
          enum:
          - ok
        version:
          type: string
      example:
        status: ok
        version: '1'
    ProbeReadinessChecks:
      type: object
      required:
      - db
      - schema
      properties:
        db:
          type: string
          description: Database connectivity readiness.
          enum:
          - ok
          - fail
        schema:
          type: string
          description: Migration head readiness (`fail` may still be non-blocking when `MIGRATIONS_STRICT=false`).
          enum:
          - ok
          - fail
          - skip
      example:
        db: ok
        schema: skip
    ProbeReadinessResponse:
      type: object
      required:
      - status
      - version
      - checks
      properties:
        status:
          type: string
          enum:
          - ready
          - not_ready
        version:
          type: string
        checks:
          $ref: '#/components/schemas/ProbeReadinessChecks'
      example:
        status: ready
        version: '1'
        checks:
          db: ok
          schema: skip
